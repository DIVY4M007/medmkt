services:
  - type: web
    name: medmkt
    runtime: node
    plan: free
    region: oregon
    buildCommand: chmod +x build-render.sh && ./build-render.sh
    startCommand: chmod +x start-render.sh && ./start-render.sh
    disk:
      name: medmkt-data
      mountPath: /opt/render/project/src/db
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./db/production.db
      - key: PORT
        value: 10000
      - key: HOSTNAME
        value: 0.0.0.0
